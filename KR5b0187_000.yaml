front:
  text: 金籙十回度人午朝開收儀
  hash: sha256:02784473cf0a2009710a98baf38a9a293e15e288bc87dade80e35992cd192ebe
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0187_HFL_000-001a, image: hfl/0267/0267-104.png}
body:
  text: 宣齊意後三歸依宿命讃宣五回開經文臣恭以玊隆騰勝之鄉超無色界碧落浮黎之境即始青天昔虛皇將闡道之時開法㑹特說經於此初登獅座上其周回十過猶可得聞既入黍珠中則祕密一真其誰能識是謂象外之象要識玄中之玄臣今欽奉綸音崇修金籙延禧大齊幾晝夜臣今引領官衆升壇第五回轉誦太上洞玄靈寶無量度人上品妙經朝禮寶誥仰依無上三寶慈尊十方諸天大聖慈悲願力主盟經功伏願開紫陽之祕笈出元始之禁書啓迪羣蒙發輝萬有琳琅振響自成空洞之音雲漢分章洞煥太空之色有情有識悉見悉聞稽首歸依修行經法敷座吟諷經畢解座吟回向臣恭以萬物成終成始皆在艮方五行一生一成終歸土數自立春之應𠊱宜生氣之騰升蓋內陽外隂至此而始交泰自含靈負性何患其不生成臣適來引領官衆升壇轉誦太上洞玄靈寶無量度人上品妙經第五遍徑用回向東北方無極太上靈寶天尊紫清降福天尊東北始青天梵氣天君天一紫氣道曜星君尾宿天雞星君箕宿天津星君斗宿天廟星君牛宿天機星君丑寅二宮吳燕分野列位星君磨蝎二宮尊神東北方無極無量品至真大神飛天神王長生大聖無量度人君本命太歲祿馬尊神紫堂神煞官衆齊壇應感一切真靈乞以經功願力延福致祥添齡益算伏願五星同色九曜順行紫氣灌斗牛祥瑞下呈於地寶東維騎箕尾英賢上補於天官自作善而降百祥以建極而敷五福稽首歸依旋行讃詠智惠頌學道由丹信奉師如至親挹景偶清虛孶孶隨日新衆人未得度終不度我身大願有重報玄德必昭然隂惡罪至深對來若轉輪高功於東北方恭文宣表關焚化宣六回開經文臣恭以九霄三十六天莫貴於真王大帝度人六十一卷咸宗於無量本章蓋彼或專主一事而言在此則總攝一乘之義修仙學道卓有竒功保國寧家具存正法蓋源逺則波瀾衍溢本大而枝葉扶踈者也臣今欽奉綸音崇修金籙延禧大齊幾晝夜臣今引領官衆升壇第六回轉誦太上洞玄靈寶無量度人上品妙經朝禮寶誥仰依無上三寶慈尊十方諸天大聖慈悲願力主盟經功伏願天開此道帝誘其衷悟妙義於一時怡然順理聞靈音於六轉昭若發蒙福及邦家慶流藩屏見前法衆妙振靈音稽首虛皇修行經法敷座吟諷經畢解座吟回向臣恭以六召東南巽為卦氣語其時則夏之𥘉立萬物潔齊考其數則水之既成一元歸本夫以至學之搬運妙在醴泉之流通是故齒落更生乃玊液朝泥丸之效髮白返黑亦金精飛肘後之功倘知妙理之歸即悟神化之道臣適來引領官衆升壇轉誦太上洞玄靈寶度人上品妙經第六遍徑用回向東南方無極太上靈寶天尊東南方長生保命天尊東南始青天梵氣天君神尾計都墜曜星君翼宿天都星君天垣帝座星君軫宿天街星君角宿天門星君亢宿天庭星君辰已二宫尊神鄭楚分野列宿星君天稱雙女二宫尊神東南方無極無量品至真大神飛天神王長生大聖無量度人君本命太歲祿馬尊神紫堂神煞官衆三界官屬應感真靈乞以經功願力安鎮東南壽星鶉尾之次延福致祥增年益算伏願開明三景回度五常龍角之次杓明發為祥兆鶉尾之間星正散作福基稽首歸依旋行讃詠智惠頌學道亦甚苦晨昏建福田種德猶植𣗳積基而成山子能耽玄上飄爾升青天修是無為道常與善結緣太上至隱書名曰智慧篇福國由大材超俗以得仙靈姿世所竒曄若淵中蓮高功於東南方恭文宣表關焚化宣七回開經文臣恭以靈寶本章玄都祕典其五篇敷落有安天鎮地之功其萬範開張有導運御世之力何故名經之義獨指度人而言豈不以人為萬物之靈則必以君為天下之主人者三才之貴無人則曷見天地之心其稱名也宜哉其取類也逺矣臣今欽奉綸音崇修金籙延禧大齊幾晝夜臣今引領官衆升壇第七回轉誦太上洞玄靈寶無量度人上品妙經朝禮寶誥仰依無上三寶慈尊十方諸天大聖慈悲願力主盟經功伏願弘宣道化大振玄風庶幾沈潜反覆之餘默契冥惠洞清之妙鎮安國祚祈請福祥所願者從不求而獲在壇法衆妙振靈音稽首虛皇修行經法敷座吟諷經畢解座吟回向臣恭以物養乎坤形體總歸於地大火成於七氣神皆養於心君內修鍊氣之方外盡養形之術故得頭童齒豁乃復化為朱顔骨弱筋柔今居然成壯力蓋說經之異效亦聖化之同仁臣適來引領官衆升壇轉誦太上洞玄靈寶無量度人上品妙經第七回徑用回向西南方無極太上靈寶天尊西南方福生無量天尊西南方始素天梵氣天君天垣帝座星君太一月孛暗曜星君觜宿天屏星君參宿天水星君井宿天井星君鬼宿天饋星君申未二宮尊神西南方無極無量品至真大神飛天神王長生大聖無量度人君本命太歲祿馬尊神紫堂神煞官衆三界官屬應感真靈乞以經功願力安鎮西南方鶉尾之次保命延年迎祥集福伏願祥開雲漢光照人寰井鬼守房順經躔於星度觜參總斗妙運轉於天關福祥駢集於命宮貴祿常扶於運限稽首歸依旋行讃詠智慧頌人行各有本皆由宿世功立德務及時發願莫不從善惡俱待對倚伏理難窮賢士奉法言道亦在兼忘解是大智慧上為太極公寶蓋連玊輿命駕御九龍金華擎洞經捧香悉仙童嘯歌徹玄都鳴玊扣瓊鐘高功於西南方恭文宣表關焚化宣八回開經文臣恭以元始出書雖主無量度人之義神仙內學蓋有脫胎神化之功粵自寶珠五丈之高縣已具金汞九還之妙理日月停景當含光默默之時山嶽藏雲正調息綿綿之際三尸滅而三界侍衛五氣理而五帝司迎及乎玄珠丹成聖功胎就金房度命直為金闕之登庸玊簡刋名可與玊京之遊宴臣今欽奉綸音崇修金籙延禧大齊幾晝夜臣今引領官衆升壇第八回轉誦太上洞玄靈寶無量度人上品妙經朝禮寶誥仰依無上三寶慈尊十方諸天大聖慈悲願力主盟經功伏願身乘三素之雲項負九光之像烏兔鬱羅於一室獅鶴備守於四方令臣等口誦心惟造大量玄玄之地神交意㑹悟至無寂寂之機普願有情均證無漏同壇法衆妙振靈音稽首虛皇修行經法敷座吟諷經畢解座吟回向臣恭以天地以生物為心功成不宰靈寶以度人立教道濟無窮故經功八遍之周回符乾道一元之變化既各正於性命宜皆得於生成蓋高下洪纎自色自形而無間胎卵濕化不殰不殈以何憂神異竒哉玄恩大矣臣適來引領官衆升壇轉誦太上洞玄靈寶無量度人上品妙經第八回徑用回向西北方無極太上靈寶天尊西北方九宮捍厄天尊西北方始玄天梵氣天君天垣帝座星君神首羅㬋建曜星君室宿天廪星君壁宿天市星君奎宿天將星君婁宿天獄星君戍亥二宮魯衛分野列位星君白羊雙魚二宮尊神西北方無極無量品至真大神飛天神王長生大聖無量度人君本命太歲祿馬尊神紫堂神煞官衆齊壇應感一切真靈乞以經功願力安鎮西北方降婁娵訾之次保命延年迎祥致福伏願神符鎮魯衛之分天文煥奎壁之星身命運限之宮常興善瑞年月日時之否悉化亨貞凡有守以有為俱無災而無害稽首歸依旋行讃詠智慧頌竦身凌太虛超景逸紫清保元持法綱遊玄極逍遙萬劫猶昨夜千春如晨朝巍峩䕃雲華手攀寶林條香烟自然生玄階興扶搖靈幡順風散繁想應時消滅智弘大混無為為清謡高功於西北方恭文宣表關焚化三聞經發願復爐下壇謝師回回金籙十回度人午朝開收儀
