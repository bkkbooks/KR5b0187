front:
  text: 金籙十廻度人午朝開收儀
  hash: sha256:515414a1e99801db084b61df2d71a424ba80a1f5208dbb5aaaeee56f3145928b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0187_SJB_000-090115c, image: sjb/09/090115c.png}
body:
  text: 宣齋意後三歸依宿命讃宣五迴開經文臣恭以玊隆騰勝之鄕超無色界碧落浮黎之境即始青天昔虚皇將闡道之時開法㑹特說經於此初登獅座上其周迴十過猶可得聞旣入黍珠中則祕宻一眞其誰能識是謂象外之象要識玄中之玄臣今欽奉綸音崇修金籙延禧大齋幾晝夜臣今引領官衆升壇第五回轉誦太上洞玄靈寳無量度人上品妙經朝禮寳誥仰依無上三寳慈尊十方諸天大聖慈悲願力主盟經功伏願開紫陽之祕笈出元始之禁書啓迪羣蒙發輝萬有琳琅振響自成空洞之音雲漢分章洞煥太空之色有情有識悉見悉聞稽首歸依修行經法敷座吟諷經畢解座吟回向臣恭以萬物成終成始皆在艮方五行一生一成終歸土數自立春之應𠊱宜生氣之騰升蓋内陽外隂至此而始交泰自含靈負性何患其不生成臣適來引領官衆升壇轉誦太上洞玄靈寳無量度人上品妙經第五徧徑用回向東北方無極太上靈寳天尊紫清降福天尊東北始青天梵炁天君天一紫炁道曜星君尾宿天雞星君箕宿天津星君斗宿天廟星君牛宿天機星君丑寅二宮呉燕分野列位星君磨蝎二宮尊神東北方無極無量品至眞大神飛天神王長生大聖無量度人君本命太歲祿馬尊神紫堂神煞官衆齋壇應感一切眞靈乞以經功願力延福致祥添齡益筭伏願五星同色九曜順行紫炁灌斗牛祥瑞下呈於地寳東維騎箕尾英賢上補於天官自作善而降百祥以建極而敷五福稽首歸依旋行讃詠智惠頌學道由丹信奉師如至親挹景偶清虚孶孶隨日新衆人未得度終不度我身大願有重報玄德必昭然隂惡罪至深對來若轉輪高功於東北方恭文宣表關焚化宣六迴開經文臣恭以九霄三十六天莫貴於眞王大帝度人六十一卷咸宗於無量本章蓋彼或專主一事而言在此則總攝一乘之義修仙學道卓有竒功保國寜家具存正法蓋源逺則波瀾衍溢本大而枝葉扶踈者也臣今欽奉綸音崇修金籙延禧大齋幾晝夜臣今引領官衆升壇第六迴轉誦太上洞玄靈寳無量度人上品妙經朝禮寳誥仰依無上三寳慈尊十方諸天大聖慈悲願力主盟經功伏願天開此道帝誘其衷悟妙義於一時怡然順理聞靈音於六轉昭若發蒙福及邦家慶流藩屏見前法衆妙振靈音稽首虚皇修行經法敷座吟諷經畢解座吟回向臣恭以六召東南巽爲卦炁語其時則夏之𥘉立萬物潔齊考其數則水之旣成一元歸本夫以至學之搬運妙在醴泉之流通是故齒落更生乃玊液朝泥丸之效髮白返黑亦金精飛肘後之功倘知妙理之歸即悟神化之道臣適來引領官衆升壇轉誦太上洞玄靈寳度人上品妙經第六徧徑用回向東南方無極太上靈寳天尊東南方長生保命天尊東南始青天梵炁天君神尾計都墜曜星君翼宿天都星君天垣帝座星君軫宿天街星君角宿天門星君亢宿天庭星君辰已二宫尊神鄭楚分野列宿星君天秤雙女二宫尊神東南方無極無量品至眞大神飛天神王長生大聖無量度人君本命太歳禄馬尊神紫堂神煞官衆三界官屬應感眞靈乞以經功願力安鎭東南壽星鶉尾之次延福致祥增年益筭伏願開明三景回度五常龍角之次杓明發爲祥兆鶉尾之間星正散作福基稽首歸依旋行讃詠智惠頌學道亦甚苦晨昏建福田種德猶植𣗳積基而成山子能耽玄上飄爾升青天修是無爲道常與善結縁太上至隱書名曰智慧篇福國由大材超俗以得仙靈姿世所竒曄若淵中蓮高功於東南方恭文宣表關焚化宣七迴開經文臣恭以靈寳本章玄都祕典其五篇敷落有安天鎭地之功其萬範開張有導運御世之力何故名經之義獨指度人而言豈不以人爲萬物之靈則必以君爲天下之主人者三才之貴無人則曷見天地之心其稱名也宜哉其取類也逺矣臣今欽奉綸音崇修金籙延禧大齋幾晝夜臣今引領官衆升壇第七迴轉誦太上洞玄靈寳無量度人上品妙經朝禮寳誥仰依無上三寳慈尊十方諸天大聖慈悲願力主盟經功伏願弘宣道化大振玄風庶幾沈潜反覆之餘黙契冥惠洞清之妙鎭安國祚祈請福祥所願者從不求而獲在壇法衆妙振靈音稽首虚皇修行經法敷座吟諷經畢解座吟回向臣恭以物養乎坤形體總歸於地大火成於七氣神皆養於心君内修鍊氣之方外盡養形之術故得頭童齒豁乃復化爲朱顔骨弱筋柔今居然成壯力蓋說經之異效亦聖化之同仁臣適來引領官衆升壇轉誦太上洞玄靈寳無量度人上品妙經第七迴徑用回向西南方無極太上靈寳天尊西南方福生無量天尊西南方始素天梵炁天君天垣帝座星君太一月孛暗曜星君觜宿天屏星君參宿天水星君井宿天井星君鬼宿天饋星君申未二宮尊神西南方無極無量品至眞大神飛天神王長生大聖無量度人君本命太歳祿馬尊神紫堂神煞官衆三界官屬應感眞靈乞以經功願力安鎭西南方鶉尾之次保命延年迎祥集福伏願祥開雲漢光照人寰井鬼守房順經躔於星度觜參總斗妙運轉於天關福祥駢集於命宮貴祿常扶於運限稽首歸依旋行讃詠智慧頌人行各有本皆由宿世功立德務及時發願莫不從善惡俱待對倚伏理難窮賢士奉法言道亦在兼忘解是大智慧上爲太極公寳蓋連玊輿命駕御九龍金華擎洞經捧香悉仙童嘯歌徹玄都鳴玊扣瓊鐘高功於西南方恭文宣表關焚化宣八迴開經文臣恭以元始出書雖主無量度人之義神仙内學蓋有脫胎神化之功粵自寳珠五丈之高縣已具金汞九還之妙理日月停景當含光黙黙之時山嶽藏雲正調息綿綿之際三尸滅而三界侍衞五炁理而五帝司迎及乎玄珠丹成聖功胎就金房度命直爲金闕之登庸玊簡刋名可與玊京之遊宴臣今欽奉綸音崇修金籙延禧大齋幾晝夜臣今引領官衆升壇第八迴轉誦太上洞玄靈寳無量度人上品妙經朝禮寳誥仰依無上三寳慈尊十方諸天大聖慈悲願力主盟經功伏願身乘三素之雲項負九光之像烏兔鬱羅於一室獅鶴備守於四方令臣等口誦心惟造大量玄玄之地神交意㑹悟至無寂寂之機普願有情均證無漏同壇法衆妙振靈音稽首虚皇修行經法敷座吟諷經畢解座吟回向臣恭以天地以生物爲心功成不宰靈寳以度人立教道濟無窮故經功八徧之周迴符乾道一元之變化旣各正於性命宜皆得於生成蓋高下洪纎自色自形而無間胎卵濕化不殰不殈以何憂神異竒哉玄恩大矣臣適來引領官衆升壇轉誦太上洞玄靈寳無量度人上品妙經第八迴徑用回向西北方無極太上靈寳天尊西北方九宮捍戹天尊西北方始玄天梵炁天君天垣帝座星君神首羅㬋建曜星君室宿天廪星君壁宿天市星君奎宿天將星君婁宿天獄星君戍亥二宮魯衞分野列位星君白羊雙魚二宮尊神西北方無極無量品至眞大神飛天神王長生大聖無量度人君本命太歲祿馬尊神紫堂神煞官衆齋壇應感一切眞靈乞以經功願力安鎭西北方降婁娵訾之次保命延年迎祥致福伏願神符鎭魯衞之分天文煥奎壁之星身命運限之宮常興善瑞年月日時之否悉化亨貞凡有守以有爲俱無災而無害稽首歸依旋行讃詠智慧頌竦身凌太虚超景逸紫清保元持法綱遊玄極逍遥萬劫猶昨夜千春如晨朝巍峩䕃雲華手攀寳林條香烟自然生玄階興扶摇靈旛順風散繁想應時消滅智弘大混無爲爲清謡高功於西北方恭文宣表關焚化三聞經發願復鑪下壇謝師回回金籙十迴度人午朝開收儀
